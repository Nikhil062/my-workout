<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Futuristic Workout Tracker</title>
    <style>
        :root {
            --bg-dark: #090d16;
            --panel-bg: #131b2e;
            --panel-border: #223154;
            --glow-blue: #00f2fe;
            --glow-green: #4facfe;
            --text-primary: #ffffff;
            --text-secondary: #64748b;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-primary);
            margin: 0;
            padding: 16px;
            display: flex;
            justify-content: center;
        }

        .app-container {
            width: 100%;
            max-width: 440px;
            background-color: var(--panel-bg);
            padding: 24px;
            border-radius: 24px;
            box-shadow: 0 0 30px rgba(0, 242, 254, 0.15);
            border: 1px solid var(--panel-border);
        }

        h1 {
            text-align: center;
            font-size: 24px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 24px;
            background: linear-gradient(135deg, var(--glow-blue), var(--glow-green));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .stats-dashboard {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }

        .stat-box {
            background: rgba(9, 13, 22, 0.6);
            padding: 16px;
            border-radius: 16px;
            text-align: center;
            border: 1px solid var(--panel-border);
        }

        .stat-val {
            font-size: 28px;
            font-weight: 800;
            color: var(--glow-blue);
            text-shadow: 0 0 10px rgba(0, 242, 254, 0.4);
        }

        .stat-lbl {
            font-size: 11px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 4px;
        }

        /* Simplified Weekly Visualizer */
        .calendar-panel {
            background: rgba(9, 13, 22, 0.6);
            padding: 16px;
            border-radius: 16px;
            border: 1px solid var(--panel-border);
            margin-bottom: 24px;
        }
        
        .calendar-title {
            font-size: 11px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
            text-align: center;
        }

        .days-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
            text-align: center;
        }

        .day-dot {
            padding: 8px 0;
            background: rgba(255,255,255,0.03);
            border-radius: 8px;
            font-size: 12px;
            font-weight: bold;
            color: var(--text-secondary);
            border: 1px solid var(--panel-border);
        }

        .day-dot.completed {
            background: rgba(16, 185, 129, 0.2);
            color: #10b981;
            border-color: #10b981;
            text-shadow: 0 0 8px rgba(16, 185, 129, 0.4);
        }

        .section {
            background: rgba(255, 255, 255, 0.02);
            padding: 18px;
            border-radius: 16px;
            margin-bottom: 16px;
            border: 1px solid var(--panel-border);
        }

        .section-title {
            font-weight: 800;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 14px;
            color: var(--glow-green);
        }

        .task-item {
            display: flex;
            align-items: center;
            margin: 10px 0;
            cursor: pointer;
            font-size: 15px;
            padding: 12px;
            border-radius: 10px;
            background: rgba(9, 13, 22, 0.4);
            border: 1px solid transparent;
            transition: all 0.2s;
        }

        .task-item input {
            margin-right: 14px;
            transform: scale(1.3);
            accent-color: var(--glow-blue);
        }

        .task-item.checked {
            border-color: rgba(0, 242, 254, 0.2);
            background: rgba(0, 242, 254, 0.03);
            opacity: 0.4;
            text-decoration: line-through;
        }

        .timer-display {
            text-align: center;
            font-size: 46px;
            font-weight: 900;
            color: #ef4444;
            margin: 12px 0;
            font-family: monospace;
            text-shadow: 0 0 10px rgba(239, 68, 68, 0.3);
        }

        .btn-container {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        button {
            padding: 12px 24px;
            border: none;
            border-radius: 10px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }

        button:active {
            transform: scale(0.96);
        }

        .btn-start {
            background: linear-gradient(135deg, var(--glow-blue), var(--glow-green));
            color: #000;
            box-shadow: 0 4px 15px rgba(0, 242, 254, 0.3);
        }

        .btn-reset {
            background-color: #1e293b;
            color: var(--text-primary);
            border: 1px solid var(--panel-border);
        }

        .btn-finish {
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            width: 100%;
            padding: 16px;
            font-size: 15px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(16, 185, 129, 0.2);
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="app-container">
    <h1>System Dashboard</h1>

    <div class="stats-dashboard">
        <div class="stat-box">
            <div class="stat-val" id="totalWorkouts">0</div>
            <div class="stat-lbl">Total Completed</div>
        </div>
        <div class="stat-box">
            <div class="stat-val" id="streakDays">0🔥</div>
            <div class="stat-lbl">Current Streak</div>
        </div>
    </div>

    <!-- Weekly Tracker Circles -->
    <div class="calendar-panel">
        <div class="calendar-title">Weekly Tracker Matrix</div>
        <div class="days-grid">
            <div class="day-dot" id="day-0">M</div>
            <div class="day-dot" id="day-1">T</div>
            <div class="day-dot" id="day-2">W</div>
            <div class="day-dot" id="day-3">T</div>
            <div class="day-dot" id="day-4">F</div>
            <div class="day-dot" id="day-5">S</div>
            <div class="day-dot" id="day-6">S</div>
        </div>
    </div>

    <div class="section">
        <div class="section-title">01 / Warm-Up (Jumping Jacks)</div>
        <label class="task-item"><input type="checkbox" class="workout-checkbox" onchange="toggleCheck(this)"> Set 1: 20 Jumping Jacks</label>
        <label class="task-item"><input type="checkbox" class="workout-checkbox" onchange="toggleCheck(this)"> Set 2: 20 Jumping Jacks</label>
        <label class="task-item"><input type="checkbox" class="workout-checkbox" onchange="toggleCheck(this)"> Set 3: 20 Jumping Jacks</label>
    </div>

    <div class="section">
        <div class="section-title">02 / Strength (Push-Ups)</div>
        <label class="task-item"><input type="checkbox" class="workout-checkbox" onchange="toggleCheck(this)"> Set 1: 20 Push-Ups</label>
        <label class="task-item"><input type="checkbox" class="workout-checkbox" onchange="toggleCheck(this)"> Set 2: 20 Push-Ups</label>
        <label class="task-item"><input type="checkbox" class="workout-checkbox" onchange="toggleCheck(this)"> Set 3: 10 Push-Ups</label>
    </div>

    <div class="section">
        <div class="section-title">03 / Core Endurance (Plank)</div>
        <label class="task-item"><input type="checkbox" class="workout-checkbox" onchange="toggleCheck(this)"> Hold 1: 30 Seconds</label>
        <label class="task-item"><input type="checkbox" class="workout-checkbox" onchange="toggleCheck(this)"> Hold 2: 30 Seconds</label>
        <label class="task-item"><input type="checkbox" class="workout-checkbox" onchange="toggleCheck(this)"> Hold 3: 30 Seconds</label>
        <label class="task-item"><input type="checkbox" class="workout-checkbox" onchange="toggleCheck(this)"> Hold 4: 30 Seconds</label>
        
        <div class="timer-display" id="timer">00:30</div>
        <div class="btn-container">
            <button class="btn-start" id="startBtn" onclick="toggleTimer()">Start Hold</button>
            <button class="btn-reset" onclick="resetTimer()">Reset</button>
        </div>
    </div>

    <button class="btn-finish" onclick="finishWorkout()">Submit Session Log</button>
</div>

<script>
    let timeLeft = 30;
    let timerInterval = null;
    let isRunning = false;

    let totalWorkouts = parseInt(localStorage.getItem('totalWorkouts')) || 0;
    let streakDays = parseInt(localStorage.getItem('streakDays')) || 0;
    let lastWorkoutDate = localStorage.getItem('lastWorkoutDate') || "";
    let weeklyHistory = JSON.parse(localStorage.getItem('weeklyHistory')) ||;

    document.getElementById('totalWorkouts').innerText = totalWorkouts;
    document.getElementById('streakDays').innerText = streakDays + "🔥";

    function updateCalendarUI() {
        for(let i=0; i<7; i++) {
            const dayEl = document.getElementById(`day-${i}`);
            if(weeklyHistory[i] === 1) {
