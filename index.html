<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimalist Workout Tracker</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a252f;
            color: #ecf0f1;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .app-container {
            width: 100%;
            max-width: 450px;
            background-color: #2c3e50;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }
        h1 {
            text-align: center;
            font-size: 22px;
            color: #fff;
            margin-bottom: 25px;
            letter-spacing: 1px;
        }
        .section {
            background-color: #34495e;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        .section-title {
            font-weight: bold;
            font-size: 16px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
        }
        .warmup .section-title { color: #3498db; }
        .pushups .section-title { color: #2ecc71; }
        .plank .section-title { color: #e67e22; }
        
        .task-item {
            display: flex;
            align-items: center;
            margin: 10px 0;
            cursor: pointer;
            font-size: 15px;
        }
        .task-item input {
            margin-right: 12px;
            transform: scale(1.3);
            accent-color: #2ecc71;
        }
        .timer-display {
            text-align: center;
            font-size: 36px;
            font-weight: bold;
            color: #e74c3c;
            margin: 15px 0 5px 0;
        }
        .btn-container {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 10px;
        }
        button {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-start { background-color: #e67e22; color: white; }
        .btn-reset { background-color: #7f8c8d; color: white; }
        .btn-finish { background-color: #2ecc71; color: white; width: 100%; padding: 14px; font-size: 16px; margin-top: 10px; }
        button:active { opacity: 0.8; }
    </style>
</head>
<body>

<div class="app-container">
    <h1>DAILY WORKOUT TRACKER</h1>

    <!-- Jumping Jacks -->
    <div class="section warmup">
        <div class="section-title">1. Warm-Up (Jumping Jacks)</div>
        <label class="task-item"><input type="checkbox" class="workout-checkbox"> Set 1: 20 Jumping Jacks</label>
        <label class="task-item"><input type="checkbox" class="workout-checkbox"> Set 2: 20 Jumping Jacks</label>
        <label class="task-item"><input type="checkbox" class="workout-checkbox"> Set 3: 20 Jumping Jacks</label>
    </div>

    <!-- Push-Ups -->
    <div class="section pushups">
        <div class="section-title">2. Upper Body (Push-Ups)</div>
        <label class="task-item"><input type="checkbox" class="workout-checkbox"> Set 1: 20 Push-Ups</label>
        <label class="task-item"><input type="checkbox" class="workout-checkbox"> Set 2: 20 Push-Ups</label>
        <label class="task-item"><input type="checkbox" class="workout-checkbox"> Set 3: 10 Push-Ups</label>
    </div>

    <!-- Planks -->
    <div class="section plank">
        <div class="section-title">3. Core (Plank Tracker)</div>
        <label class="task-item"><input type="checkbox" class="workout-checkbox"> Hold 1: 30 Seconds</label>
        <label class="task-item"><input type="checkbox" class="workout-checkbox"> Hold 2: 30 Seconds</label>
        <label class="task-item"><input type="checkbox" class="workout-checkbox"> Hold 3: 30 Seconds</label>
        <label class="task-item"><input type="checkbox" class="workout-checkbox"> Hold 4: 30 Seconds</label>
        
        <div class="timer-display" id="timer">00:30</div>
        <div class="btn-container">
            <button class="btn-start" id="startBtn" onclick="toggleTimer()">Start Hold</button>
            <button class="btn-reset" onclick="resetTimer()">Reset</button>
        </div>
    </div>

    <button class="btn-finish" onclick="finishWorkout()">Finish Workout</button>
</div>

<script>
    let timeLeft = 30;
    let timerInterval = null;
    let isRunning = false;

    function toggleTimer() {
        const startBtn = document.getElementById('startBtn');
        if (isRunning) {
            clearInterval(timerInterval);
            startBtn.innerText = 'Resume';
            isRunning = false;
        } else {
            isRunning = true;
            startBtn.innerText = 'Pause';
            timerInterval = setInterval(() => {
                if (timeLeft > 0) {
                    timeLeft--;
                    let secs = timeLeft < 10 ? '0' + timeLeft : timeLeft;
                    document.getElementById('timer').innerText = `00:${secs}`;
                } else {
                    clearInterval(timerInterval);
                    alert("Time's up! Great hold.");
                    resetTimer();
                }
            }, 1000);
        }
    }

    function resetTimer() {
        clearInterval(timerInterval);
        timeLeft = 30;
        document.getElementById('timer').innerText = '00:30';
        document.getElementById('startBtn').innerText = 'Start Hold';
        isRunning = false;
    }

    function finishWorkout() {
        const checkboxes = document.querySelectorAll('.workout-checkbox');
        const allChecked = Array.from(checkboxes).every(cb => cb.checked);
        
        if (allChecked) {
            alert("Workout Complete! Awesome job. See you next session!");
            checkboxes.forEach(cb => cb.checked = false);
            resetTimer();
        } else {
            alert("You haven't checked off all your sets yet. Keep going!");
        }
    }
</script>

</body>
</html>
