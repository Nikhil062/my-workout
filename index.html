<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimalist Workout Tracker</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --primary: #3b82f6;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 16px;
            display: flex;
            justify-content: center;
        }
        .app-container {
            width: 100%;
            max-width: 440px;
            background-color: var(--card-bg);
            padding: 24px;
            border-radius: 20px;
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.5);
        }
        h1 {
            text-align: center;
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 20px;
            letter-spacing: 0.5px;
            background: linear-gradient(to right, #3b82f6, #10b981);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        /* Stats Dashboard Panel */
        .stats-dashboard {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 24px;
            background: rgba(15, 23, 42, 0.6);
            padding: 14px;
            border-radius: 12px;
            border: 1px solid #334155;
        }
        .stat-box {
            text-align: center;
        }
        .stat-val {
            font-size: 26px;
            font-weight: 800;
            color: var(--text-main);
        }
        .stat-lbl {
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 2px;
        }
        
        .section {
            background-color: rgba(51, 65, 85, 0.4);
            padding: 16px;
            border-radius: 14px;
            margin-bottom: 16px;
            border: 1px solid rgba(255,255,255,0.05);
            transition: transform 0.2s, border-color 0.2s;
        }
        .section:focus-within, .section:hover {
            border-color: rgba(255,255,255,0.15);
        }
        .section-title {
            font-weight: 700;
            font-size: 15px;
            margin-bottom: 14px;
        }
        .warmup .section-title { color: var(--primary); }
        .pushups .section-title { color: var(--success); }
        .plank .section-title { color: var(--warning); }
        
        .task-item {
            display: flex;
            align-items: center;
            margin: 12px 0;
            cursor: pointer;
            font-size: 15px;
            padding: 10px;
            border-radius: 8px;
            background: rgba(15, 23, 42, 0.3);
            transition: background 0.2s, opacity 0.2s;
        }
        .task-item:active { background: rgba(15, 23, 42, 0.6); }
        .task-item input {
            margin-right: 14px;
            transform: scale(1.4);
            accent-color: var(--success);
            cursor: pointer;
        }
        .task-item.checked {
            opacity: 0.5;
            text-decoration: line-through;
        }
        
        .timer-display {
            text-align: center;
            font-size: 42px;
            font-weight: 800;
            color: var(--danger);
            margin: 10px 0;
            font-variant-numeric: tabular-nums;
        }
        .btn-container {
            display: flex;
            gap: 10px;
            justify-content: center;
        }
        button {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
        }
        button:active { transform: scale(0.97); }
        .btn-start { background-color: var(--warning); color: #000; width: 130px;}
        .btn-reset { background-color: #475569; color: var(--text-main); }
        .btn-finish { 
            background: linear-gradient(135deg, var(--success), #059669); 
            color: white; 
            width: 100%; 
            padding: 16px; 
            font-size: 16px; 
            border-radius: 12px;
            box-shadow: 0 4px 14px rgba(16, 185, 129, 0.3);
            margin-top: 8px;
        }
    </style>
</head>
<body>

<div class="app-container">
    <h1>WORKOUT TRACKER</h1>

    <!-- Interactive Stats Dashboard -->
    <div class="stats-dashboard">
        <div class="stat-box">
            <div class="stat-val" id="totalWorkouts">0</div>
            <div class="stat-lbl">Total Workouts</div>
        </div>
        <div class="stat-box">
            <div class="stat-val" id="streakDays">0🔥</div>
            <div class="stat-lbl">Current Streak</div>
        </div>
    </div>

    <!-- Jumping Jacks -->
    <div class="section warmup">
        <div class="section-title">1. Warm-Up (Jumping Jacks)</div>
        <label class="task-item"><input type="checkbox" class="workout-checkbox" onchange="toggleCheck(this)"> Set 1: 20 Jumping Jacks</label>
        <label class="task-item"><input type="checkbox" class="workout-checkbox" onchange="toggleCheck(this)"> Set 2: 20 Jumping Jacks</label>
        <label class="task-item"><input type="checkbox" class="workout-checkbox" onchange="toggleCheck(this)"> Set 3: 20 Jumping Jacks</label>
    </div>

    <!-- Push-Ups -->
    <div class="section pushups">
        <div class="section-title">2. Upper Body (Push-Ups)</div>
        <label class="task-item"><input type="checkbox" class="workout-checkbox" onchange="toggleCheck(this)"> Set 1: 20 Push-Ups</label>
        <label class="task-item"><input type="checkbox" class="workout-checkbox" onchange="toggleCheck(this)"> Set 2: 20 Push-Ups</label>
        <label class="task-item"><input type="checkbox" class="workout-checkbox" onchange="toggleCheck(this)"> Set 3: 10 Push-Ups</label>
    </div>

    <!-- Planks -->
    <div class="section plank">
        <div class="section-title">3. Core (Plank Tracker)</div>
        <label class="task-item"><input type="checkbox" class="workout-checkbox" onchange="toggleCheck(this)"> Hold 1: 30 Seconds</label>
        <label class="task-item"><input type="checkbox" class="workout-checkbox" onchange="toggleCheck(this)"> Hold 2: 30 Seconds</label>
        <label class="task-item"><input type="checkbox" class="workout-checkbox" onchange="toggleCheck(this)"> Hold 3: 30 Seconds</label>
        <label class="task-item"><input type="checkbox" class="workout-checkbox" onchange="toggleCheck(this)"> Hold 4: 30 Seconds</label>
        
        <div class="timer-display" id="timer">00:30</div>
        <div class="btn-container">
            <button class="btn-start" id="startBtn" onclick="toggleTimer()">Start Hold</button>
            <button class="btn-reset" onclick="resetTimer()">Reset</button>
        </div>
    </div>

    <button class="btn-finish" onclick="finishWorkout()">Finish Workout</button>
</div>

<script>
    let timeLeft = 30;
    let timerInterval = null;
    let isRunning = false;

    // Load metrics from localized browser memory
    let totalWorkouts = parseInt(localStorage.getItem('totalWorkouts')) || 0;
    let streakDays = parseInt(localStorage.getItem('streakDays')) || 0;
    let lastWorkoutDate = localStorage.getItem('lastWorkoutDate') || "";

    // Show initial dashboard scores
    document.getElementById('totalWorkouts').innerText = totalWorkouts;
    document.getElementById('streakDays').innerText = streakDays + "🔥";

    function toggleCheck(checkbox) {
        if(checkbox.checked) {
            checkbox.parentElement.classList.add('checked');
        } else {
            checkbox.parentElement.classList.remove('checked');
        }
    }

    function toggleTimer() {
        const startBtn = document.getElementById('startBtn');
        if (isRunning) {
            clearInterval(timerInterval);
            startBtn.innerText = 'Resume';
            isRunning = false;
        } else {
            isRunning = true;
            startBtn.innerText = 'Pause';
            timerInterval = setInterval(() => {
                if (timeLeft > 0) {
                    timeLeft--;
                    let secs = timeLeft < 10 ? '0' + timeLeft : timeLeft;
                    document.getElementById('timer').innerText = `00:${secs}`;
                } else {
                    clearInterval(timerInterval);
                    alert("Time's up! Great hold.");
                    resetTimer();
                }
            }, 1000);
        }
    }

    function resetTimer() {
        clearInterval(timerInterval);
        timeLeft = 30;
        document.getElementById('timer').innerText = '00:30';
        document.getElementById('startBtn').innerText = 'Start Hold';
        isRunning = false;
    }

        const allChecked = Array.from(checkboxes).every(cb => cb.checked);

            return;
        }

            alert("Workout logged! You already completed your session today. Keep it up!");
